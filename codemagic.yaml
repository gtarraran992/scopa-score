workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60
    environment:
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web
        script: npm run build
      - name: Sync Capacitor
        script: |
          npx cap sync ios
          cp ios/App/Podfile.backup ios/App/Podfile
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install --repo-update
      - name: Build iOS
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ios/build/**/*.app