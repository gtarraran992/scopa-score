workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60
    environment:
      node: 22
      xcode: latest
      cocoapods: default
      groups:
        - secrets
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Set build number
        script: |
          cd ios/App
          agvtool bump -all
      - name: Build web
        script: npm run build
      - name: Sync Capacitor
        script: |
          npx cap sync ios
          cat > ios/App/Podfile << 'EOF'
          require_relative '/Users/builder/clone/node_modules/@capacitor/ios/scripts/pods_helpers'
          platform :ios, '16.0'
          use_frameworks!
          install! 'cocoapods', :disable_input_output_paths => true
          def capacitor_pods
            pod 'Capacitor', :path => '/Users/builder/clone/node_modules/@capacitor/ios'
            pod 'CapacitorApp', :path => '/Users/builder/clone/node_modules/@capacitor/app'
            pod 'CapacitorFirebaseAuthentication', :path => '/Users/builder/clone/node_modules/@capacitor-firebase/authentication'
            pod 'CapacitorCamera', :path => '/Users/builder/clone/node_modules/@capacitor/camera'
            pod 'CapacitorLocalNotifications', :path => '/Users/builder/clone/node_modules/@capacitor/local-notifications'
            pod 'CapacitorPushNotifications', :path => '/Users/builder/clone/node_modules/@capacitor/push-notifications'
            pod 'CapacitorBrowser', :path => '/Users/builder/clone/node_modules/@capacitor/browser'
            pod 'CapacitorCommunityNativeAudio', :path => '/Users/builder/clone/node_modules/@capacitor-community/native-audio'
          end
          target 'App' do
            capacitor_pods
          end
          EOF
      - name: Add GoogleService-Info.plist to Xcode project
        script: |
          echo $GOOGLE_SERVICE_INFO_PLIST | base64 --decode > ios/App/App/GoogleService-Info.plist
          ruby -e "
          require 'xcodeproj'
          project = Xcodeproj::Project.open('ios/App/App.xcodeproj')
          target = project.targets.first
          group = project.main_group['App']
          existing = group.files.find { |f| f.path == 'GoogleService-Info.plist' }
          if existing
            target.resources_build_phase.files.select { |f| f.file_ref == existing }.drop(1).each(&:remove_from_project)
          end
          project.save
          "
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod deintegrate || true
          rm -f Podfile.lock
          pod install --repo-update --clean-install
      - name: Build iOS
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            PODS_PODFILE_DIR_PATH=/Users/builder/clone/ios/App \
            PODS_ROOT=/Users/builder/clone/ios/App/Pods
    artifacts:
      - ios/build/**/*.app